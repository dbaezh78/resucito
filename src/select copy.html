<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selección de Cantos - Resucitó</title>
    <link rel="stylesheet" href="./css/select.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
</head>
<body>

    <div class="perfil-container">
        <div class="header-seleccion">
            <a href="/perfil.html" class="material-symbols-outlined back-btn">arrow_back</a>
            <h1>Nueva Lista</h1>
        </div>

        <div class="form-group">
            <label>Nombre de la lista</label>
            <input type="text" id="nombreLista" placeholder="Ej. Cantos de Pascua...">
        </div>

        <div class="buscador-wrapper">
            <input id="inputBuscador" type="text" placeholder="🔍 Buscar para añadir..." oninput="filtrarSeleccion()">
            <span id="btnLimpiar" onclick="limpiarBuscadorSeleccion()">&times;</span>
        </div>

        <div id="contenedor-seleccion" class="lista-scroll">
            <p class="status-msg">Cargando cantos...</p>
        </div>

        <div class="contador-footer">
            <span id="contador-seleccion">0</span> cantos seleccionados
        </div>

        <button class="btn-accion" onclick="guardarListaFirebase()">
            <span class="material-symbols-outlined">cloud_upload</span>
            Guardar Lista en Nube
        </button>
    </div>

    <script type="module" src="./js/select.js"></script>
</body>
</html>
