<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selección de Cantos - Resucitó</title>
    <link rel="icon"       href="./img/ico.ico" type="image/x-icon">
    <link rel="stylesheet" href="./css/select.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
</head>
<body>

    <div class="perfil-container">
        <div class="header-seleccion">
            <div class="title-group" style="display: flex; align-items: center; gap: 15px;">
                <a href="index.html" class="material-symbols-outlined back-btn">arrow_back</a>
                <h1 style="margin: 0;">Gestión de Listas</h1>
            </div>

            <div class="nav-icons" id="auth-status-container" style="display: flex; align-items: center; gap: 15px;">
                <a href="javascript:void(0)" 
                   id="boton-home-inteligente"
                   onclick="window.navegacionInteligente()"
                   class="material-symbols-outlined icon-button" 
                   style="text-decoration: none; cursor: pointer; color: #bc0009; font-size: 28px;">home</a>

                <button id="btn-logout-perfil" 
                        class="material-symbols-outlined icon-button" 
                        style="display:none; background:none; border:none; cursor:pointer; color: #bc0009; font-size: 28px;">logout</button>
            </div>
        </div>

        <div class="perfil-section collapsed" id="wrapper-nueva-lista">
            <div class="section-header" onclick="toggleSection('content-nueva-lista', 'wrapper-nueva-lista')" style="cursor: pointer;">
                <div class="header-title-group">
                    <span class="material-symbols-outlined arrow-icon">expand_more</span>
                    <h2 style="font-size: 1.2rem; margin: 0;">Nueva Lista</h2>
                </div>
            </div>

            <div id="content-nueva-lista" class="section-content cfg-close">
                <div class="form-group">
                    <label>Nombre de la lista</label>
                    <input type="text" id="nombreLista" placeholder="Ej. Cantos de Pascua...">
                </div>

                <div class="buscador-wrapper">
                    <input id="inputBuscador" type="text" placeholder="🔍  Buscar para añadir..." oninput="filtrarSeleccion()">
                    <span id="btnLimpiar" onclick="limpiarBuscadorSeleccion()">&times;</span>
                </div>

                <div id="contenedor-seleccion" class="lista-scroll">
                    <p class="status-msg">Cargando cantos...</p>
                </div>

                <div id="cola-seleccion" class="cola-visual"></div>

                <div class="contador-footer">
                    <span id="contador-seleccion">0</span> cantos seleccionados
                </div>

                <button class="btn-accion" onclick="guardarListaFirebase()">
                    <span class="material-symbols-outlined">cloud_upload</span>
                    Guardar en Nube
                </button>
            </div>
        </div>

        <div class="perfil-section" id="wrapper-mis-listas" style="margin-top: 20px;">
            <div class="section-header" onclick="toggleSection('content-mis-listas', 'wrapper-mis-listas')" style="cursor: pointer;">
                <div class="header-title-group">
                    <span class="material-symbols-outlined arrow-icon">expand_more</span>
                    <h2 style="font-size: 1.2rem; margin: 0;">Mis Listados</h2>
                </div>
            </div>

                        <div id="content-mis-listas" class="section-content">
                <div class="buscador-wrapper" style="margin-bottom: 15px;">
                    <input id="inputBuscadorListas" type="text" placeholder="🔍 Buscar en mis listas..." oninput="window.filtrarMisListas()">
                </div>
                
                <div id="lista-colecciones" class="listas-guardadas-container">
                    <p class="status-msg">Cargando tus listados...</p>
                </div>
            </div>
        </div>

        
    </div>

    <div id="modalVisorCanto" class="modal-fullscreen cfg-close">
        <div id="contenidoCantoVisor" class="modal-body-visor"></div>
    </div>

    <script type="module" src="js/select.js"></script>
    <script type="module" src="js/logout.js"></script>
    
</body>
</html>
