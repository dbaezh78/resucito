<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selección de Cantos - Resucitó</title>
    <link rel="icon"       href="./img/ico.ico" type="image/x-icon">
    <link rel="stylesheet" href="./css/select.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
</head>
<body>

    <div class="perfil-container">
        <div class="header-seleccion">
            <a href="/perfil.html" class="material-symbols-outlined back-btn">arrow_back</a>
            <h1>Gestión de Listas</h1>
        </div>

        <div class="perfil-section" id="wrapper-nueva-lista">
            <div class="section-header" onclick="toggleSection('content-nueva-lista', 'wrapper-nueva-lista')">
                <div class="header-title-group">
                    <span class="material-symbols-outlined arrow-icon">expand_more</span>
                    <h2 style="font-size: 1.2rem; margin: 0;">Nueva Lista</h2>
                </div>
            </div>

            <div id="content-nueva-lista" class="section-content">
                <div class="form-group">
                    <label>Nombre de la lista</label>
                    <input type="text" id="nombreLista" placeholder="Ej. Cantos de Pascua...">
                </div>

                <div class="buscador-wrapper">
                    <input id="inputBuscador" type="text" placeholder="🔍  Buscar para añadir..." oninput="filtrarSeleccion()">
                    <span id="btnLimpiar" onclick="limpiarBuscadorSeleccion()">&times;</span>
                </div>

                <div id="contenedor-seleccion" class="lista-scroll">
                    <p class="status-msg">Cargando cantos...</p>
                </div>

                <div id="cola-seleccion" class="cola-visual"></div>

                <div class="contador-footer">
                    <span id="contador-seleccion">0</span> cantos seleccionados
                </div>

                <button class="btn-accion" onclick="guardarListaFirebase()">
                    <span class="material-symbols-outlined">cloud_upload</span>
                    Guardar en Nube
                </button>
            </div>
        </div>

        <div class="perfil-section" id="wrapper-mis-listas" style="margin-top: 20px;">
            <div class="section-header" onclick="toggleSection('content-mis-listas', 'wrapper-mis-listas')">
                <div class="header-title-group">
                    <span class="material-symbols-outlined arrow-icon">expand_more</span>
                    <h2 style="font-size: 1.2rem; margin: 0;">Mis Listados</h2>
                </div>
            </div>

            <div id="content-mis-listas" class="section-content">
                <div id="lista-colecciones" class="listas-guardadas-container">
                    <p class="status-msg">Cargando tus listados...</p>
                </div>
            </div>
        </div>

    </div>




    <script type="module" src="js/select.js"></script>
    <script>
        // Función simple para colapsar (como en perfil)
        function toggleSection(contentId, wrapperId) {
            const content = document.getElementById(contentId);
            const wrapper = document.getElementById(wrapperId);
            if (content && wrapper) {
                content.classList.toggle('cfg-close');
                wrapper.classList.toggle('collapsed');
            }
        }
    </script>

<div id="modalVisorCanto" class="modal-fullscreen cfg-close">
    <div>
        <home id="btnCerrarSeguro" onclick="confirmarCerrarVisor()" class="home-icon-container">
            <span class="material-symbols-outlined dbhome">home</span>
            <small id="txtConfirmar" class=""></small>
        </home>
    </div>
    <div id="contenidoCantoVisor" class="modal-body-visor">
        </div>
</div>


</body>
</html>
