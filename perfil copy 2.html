<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Salmista - Resucitó</title>
    <link rel="icon"       href="src/img/ico.ico" type="image/x-icon">
    <link rel="stylesheet" href="src/css/styles.css">
    <link rel="stylesheet" href="src/css/cgoogle.css">
    <link rel="stylesheet" href="src/css/perfil.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
</head>
<body>

    <div class="perfil-section collapsed" id="wrapper-config">
        <div class="section-header" onclick="toggleSection('section-config', 'wrapper-config')">
            <div class="header-title-group">
                <span class="material-symbols-outlined arrow-icon">expand_more</span>
                <h2>Datos de Perfil</h2>
            </div>
            <div class="nav-icons" onclick="event.stopPropagation()" id="auth-status-container">
                <b class="google-btn-container" id="btn-login" data-action="login">
                    <span class="btn-text">Entrar con Google</span>
                    <span class="google-icon-wrapper">
                        <svg class="google-icon" viewBox="0 0 48 48">
                            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        </svg>
                    </span>
                </b>
                <a href="index.html" class="material-symbols-outlined icon-button" style="text-decoration: none;">home</a>
                <button id="btn-logout-perfil" class="material-symbols-outlined icon-button">logout</button>
            </div>
        </div>

        <div id="section-config" class="section-content cfg-close">
            <div id="profile-info" style="display: none; margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <img id="user-photo" src="" alt="Foto" style="width: 50px; height: 50px; border-radius: 50%; border: 2px solid #bc0009;">
                    <div>
                        <h3 id="user-name" style="margin: 0; color: #333;"></h3>
                        <p id="user-email" style="margin: 0; font-size: 0.9em; color: #666;"></p>
                    </div>
                </div>
                <button onclick="window.logoutUsuario()" style="margin-top: 15px; padding: 8px 15px; background: #bc0009; color: white; border: none; border-radius: 4px; cursor: pointer;">Cerrar Sesión</button>
            </div>

            <!-- FORMULARIO-->
            <div class="config-grid">
                <div class="form-group">
                    <label>País</label>
                    <select id="userCountry" onchange="llenarComunidades()">
                        <option value="">Cargando países...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Parroquia</label>
                    <input type="text" id="userParroquia" placeholder="Nombre de tu parroquia...">
                </div>
                <div class="form-group">
                    <label>Comunidad</label>
                    <select id="userComunidad">
                        <option value="">Seleccione la comunidad</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Etapa en el Camino</label>
                    <select id="userStep">
                        <option value="0">Precatecumenado</option>
                        <option value="1">Primer Escrutinio</option>
                        <option value="2">Segundo Escrutinio</option>
                        <option value="3">Iniciación a la Oración</option>
                        <option value="4">Traditio Symboli</option>
                        <option value="5">Redditio Symboli</option>
                        <option value="6">Padre Nuestro</option>
                        <option value="7">Elección</option>
                        <option value="8">Renovación de las Promesas Bautismales</option>
                    </select>
                </div>
            </div>
                        <!-- FORMULARIO-->

            <button class="btn-guardar" onclick="guardarPerfil()">Guardar Cambios</button>
        </div>
    </div>

    <div class="perfil-section collapsed" id="wrapper-cantos">
        <div class="section-header" onclick="toggleSection('section-cantos', 'wrapper-cantos')">
            <div class="header-title-group">
                <span class="material-symbols-outlined arrow-icon">expand_more</span>
                <h2>Gestión de Cantos</h2>
            </div>
        </div>

        <div id="section-cantos" class="section-content cfg-close">
            
            <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap;">
                <button onclick="sincronizarTodoARam()" class="btn-descargar-todo" style="background-color: #4285F4;">
                    <span class="material-symbols-outlined" style="vertical-align: middle; font-size: 18px;">cloud_sync</span> 
                    Sincronizar Datos Nube
                </button>

                <button id="btnDescargarTodo" onclick="gestionarDescargaTotal()" class="btn-descargar-todo">
                    📥 Descargar todo para uso Offline
                </button>
            </div>

            <div id="progreso-nube-container" style="display:none; width:100%; max-width:400px; margin:10px auto; background:#eee; border-radius:10px; overflow:hidden; border:1px solid #ccc;">
                <div id="barra-nube" style="width:0%; height:12px; background:linear-gradient(90deg, #4285F4, #34A853); transition: width 0.3s;"></div>
            </div>
            <p id="status-nube-texto" style="display:none; text-align:center; font-size:12px; color:#555; margin-top:5px;"></p>

            <div id="progreso-descarga-container" style="display:none; width:100%; max-width:400px; margin:10px auto; background:#eee; border-radius:10px; overflow:hidden; border:1px solid #ccc;">
                <div id="barra-progreso" style="width:0%; height:12px; background:linear-gradient(90deg, #FF9800, #F44336); transition: width 0.3s;"></div>
            </div>
            <p id="status-descarga-texto" style="display:none; text-align:center; font-size:12px; color:#555; margin-top:5px;"></p>

            <div id="lista-cantos-gestion">
                <p style="text-align: center; color: #666;">Cargando lista de cantos...</p>
            </div>
        </div>
    </div>

    <div class="perfil-section collapsed" id="wrapper-settings">
        <div class="section-header" onclick="toggleSection('section-settings', 'wrapper-settings')">
            <div class="header-title-group">
                <span class="material-symbols-outlined arrow-icon">expand_more</span>
                <h2>Configuración</h2>
            </div>
        </div>

        <div id="section-settings" class="section-content cfg-close">
            <div class="form-group">
                <label class="switch">
                    <input type="checkbox" id="syncToggle">
                    <span class="slider"></span>
                </label>
                <div class="config-info">
                    <span class="confg-margen">Sincronización automática con la nube</span>
                </div>
            </div>
        </div>


    </div>

    <div id="modalCalendario" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" id="closeCalendario" style="cursor:pointer; float:right; font-size: 28px;">&times;</span>
            <h2 id="nombreCantoCalendario" style="color:#bc0009; font-family:'Neocat';">Historial de Uso</h2>
            <div id="calendarioDinamico"></div>
        </div>
    </div>

    <script type="module" src="src/js/moduleGoogle.js"></script>
    <script type="module" src="src/js/perfil.js"></script>
    <script>
        function toggleSection(contentId, wrapperId) {
            const content = document.getElementById(contentId);
            const wrapper = document.getElementById(wrapperId);
            if (content && wrapper) {
                content.classList.toggle('cfg-close');
                wrapper.classList.toggle('collapsed');
            }
        }
    </script>
</body>
</html>
